version: 2
updates:
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/.github/workflows/*"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 5
    groups:
      gh-actions-packages:
        patterns:
          - "*"
    labels:
      - dependabot
      - dependencies
      - github_actions
    open-pull-requests-limit: 10
